const map = L.map("map", { center: [43.2, 20.0], zoom: 7, tap: true });

function isMobile() { return window.matchMedia("(max-width: 768px)").matches; }

function refreshMapSize() {
  setTimeout(() => map.invalidateSize(), 320);
}

function setPanelOpen(open) {
  document.body.classList.toggle("panel-open", open);
  const chevron = document.getElementById("panelChevron");
  if (chevron) chevron.textContent = open ? "下滑收起 ▼" : "上滑展开 ▲";
  refreshMapSize();
}

document.getElementById("panelFab").onclick = () => setPanelOpen(true);
document.getElementById("panelHeader").onclick = () => {
  if (isMobile()) setPanelOpen(!document.body.classList.contains("panel-open"));
};
document.getElementById("panelHandle").onclick = () => {
  if (isMobile()) setPanelOpen(!document.body.classList.contains("panel-open"));
};

window.addEventListener("resize", refreshMapSize);
window.matchMedia("(max-width: 768px)").addEventListener("change", e => {
  if (!e.matches) document.body.classList.remove("panel-open");
  refreshMapSize();
});

const cartoAttribution = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

const cartoVoyager = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png",
  { subdomains: "abcd", maxZoom: 19, attribution: cartoAttribution }
);

const osmLayer = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { subdomains: "abc", maxZoom: 18, attribution: cartoAttribution }
);

const osmDeLayer = L.tileLayer(
  "https://tile.openstreetmap.de/{z}/{x}/{y}.png",
  { maxZoom: 18, attribution: cartoAttribution }
);

cartoVoyager.addTo(map);

const zhLabelGroup = L.layerGroup();
ZH_PLACE_LABELS.forEach(item => {
  const isCountry = item.kind === "country";
  const isWater = item.kind === "water";
  const color = isWater ? "#1d4ed8" : "#b45309";
  const size = isCountry ? 14 : isWater ? 12 : 12;
  const weight = isCountry ? 800 : 700;
  const marker = L.marker([item.lat, item.lon], {
    interactive: false,
    labelMeta: item,
    icon: L.divIcon({
      className: "zh-map-label",
      html: `<span style="font-size:${size}px;font-weight:${weight};color:${color};background:rgba(255,255,255,0.82);padding:1px 5px;border-radius:4px;border:1px solid rgba(180,83,9,0.35);box-shadow:0 1px 3px rgba(0,0,0,.15);white-space:nowrap">${item.name}</span>`,
      iconSize: [0, 0],
      iconAnchor: [0, 0]
    })
  });
  zhLabelGroup.addLayer(marker);
});

function refreshZhLabels() {
  const z = map.getZoom();
  zhLabelGroup.eachLayer(layer => {
    const m = layer.options.labelMeta;
    const show = z >= m.minZoom && (!m.maxZoom || z <= m.maxZoom);
    if (layer._icon) layer._icon.style.display = show ? "" : "none";
  });
}

zhLabelGroup.addTo(map);

L.control.layers(
  {
    "Carto 完整地名": cartoVoyager,
    "OpenStreetMap": osmLayer,
    "OSM 德国镜像": osmDeLayer
  },
  { "中文地名（主要城市）": zhLabelGroup },
  { position: "topright", collapsed: isMobile() }
).addTo(map);

map.on("zoomend", refreshZhLabels);
refreshZhLabels();

const routeLayers = {};
const markerLayers = {};
const stayLayerGroup = L.layerGroup().addTo(map);
const dayVisible = {};
let allVisible = true;

function addStayCenters() {
  const list = document.getElementById("stayList");
  STAY_CENTERS.forEach(s => {
    const hubIcon = L.divIcon({
      className: "",
      html: `<div style="background:#f59e0b;border:3px solid #fff;border-radius:4px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 12px rgba(0,0,0,.45);font-weight:bold;color:#fff">★</div>`,
      iconSize: [38, 38], iconAnchor: [19, 19]
    });
    const hubMarker = L.marker([s.hub.lat, s.hub.lon], { icon: hubIcon, zIndexOffset: 1000 })
      .bindPopup(`<b style="color:#b45309">${s.city}</b><br/><b>${s.hub.name}</b><br/><small>${s.hub.sub}</small><br/><hr style="margin:6px 0"/><small>${s.tips}</small><br/><a href="https://www.google.com/maps?q=${s.hub.lat},${s.hub.lon}" target="_blank">Google Maps →</a>`);
    stayLayerGroup.addLayer(hubMarker);

    if (s.hub2) {
      const h2 = L.marker([s.hub2.lat, s.hub2.lon], {
        icon: L.divIcon({
          className: "",
          html: `<div style="background:#fff;border:2.5px solid #f59e0b;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.3)">商</div>`,
          iconSize: [24, 24], iconAnchor: [12, 12]
        }), zIndexOffset: 900
      }).bindPopup(`<b>${s.hub2.name}</b><br/><small>${s.hub2.sub}</small>`);
      stayLayerGroup.addLayer(h2);
    }

    if (s.stayPin) {
      const sp = L.marker([s.stayPin.lat, s.stayPin.lon], {
        icon: L.divIcon({
          className: "",
          html: `<div style="background:#2563eb;border:2.5px solid #fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.35)">🏨</div>`,
          iconSize: [30, 30], iconAnchor: [15, 15]
        }), zIndexOffset: 950
      }).bindPopup(`<b>${s.stayPin.name}</b><br/><small>${s.stayPin.sub}</small>`);
      stayLayerGroup.addLayer(sp);
    }

    const circle = L.circle([s.zone.lat, s.zone.lon], {
      radius: s.zone.radius,
      color: "#f59e0b", weight: 2, dashArray: "6,6",
      fillColor: "#fbbf24", fillOpacity: 0.15
    }).bindPopup(`<b>${s.city} · 建议住宿范围</b><br/><small>${s.zone.label}</small>`);
    stayLayerGroup.addLayer(circle);

    const block = document.createElement("div");
    block.innerHTML = `<div class="stay-city" data-lat="${s.hub.lat}" data-lon="${s.hub.lon}">${s.city}</div>
      <div class="stay-detail">★ ${s.hub.name.replace("最繁华核心 · ","")}</div>
      ${s.hub2 ? `<div class="stay-detail">商 ${s.hub2.name.replace("商业步行街 · ","")}</div>` : ""}
      ${s.stayPin ? `<div class="stay-detail">🏨 ${s.stayPin.name.replace("🏨 ","")}</div>` : ""}
      <div class="stay-detail">圈 ${s.zone.label}</div>`;
    block.querySelector(".stay-city").onclick = () => {
      map.setView([s.hub.lat, s.hub.lon], isMobile() ? 14 : 15);
      hubMarker.openPopup();
      if (isMobile()) setPanelOpen(false);
    };
    list.appendChild(block);
  });
}

async function fetchOsrm(waypoints) {
  const s = waypoints.map(([lon, lat]) => `${lon},${lat}`).join(";");
  const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${s}?overview=full&geometries=geojson`);
  const data = await res.json();
  if (data.code !== "Ok") throw new Error(data.code);
  return data.routes[0].geometry;
}

function addMarkers(day) {
  const group = L.layerGroup();
  day.pois.forEach(p => {
    const icon = L.divIcon({
      className: "",
      html: `<div style="background:#fff;border:2.5px solid ${day.color};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.35)">${p.emoji}</div>`,
      iconSize: [32, 32], iconAnchor: [16, 16]
    });
    const m = L.marker([p.lat, p.lon], { icon })
      .bindPopup(`<b style="color:${day.color}">${day.label}</b><br/><b>${p.name}</b><br/><small>${p.sub}</small><br/><a href="https://www.google.com/maps?q=${p.lat},${p.lon}" target="_blank">Google Maps →</a>`);
    m._poiId = p.id;
    group.addLayer(m);
  });
  group.addTo(map);
  markerLayers[day.id] = group;
}

function buildSidebar() {
  const sb = document.getElementById("sidebar");
  DAYS.forEach(day => {
    dayVisible[day.id] = true;
    const block = document.createElement("div");
    block.className = "day-block";
    block.id = "block-" + day.id;

    const title = document.createElement("div");
    title.className = "day-title";
    title.innerHTML = `<span class="day-dot" style="background:${day.color}"></span><span>${day.date} ${day.label}</span>`;
    title.onclick = () => toggleDay(day.id);

    const routeDesc = document.createElement("div");
    routeDesc.className = "day-route";
    routeDesc.textContent = day.desc + (day.mode === "walk" ? " · 虚线" : day.mode === "drive" ? " · 实线=公路" : "");

    block.appendChild(title);
    block.appendChild(routeDesc);
    day.pois.forEach(p => {
      const el = document.createElement("div");
      el.className = "poi-item";
      el.innerHTML = `${p.emoji} ${p.name} <span class="tag">${p.sub}</span>`;
      el.onclick = () => {
        map.setView([p.lat, p.lon], isMobile() ? 14 : 15);
        markerLayers[day.id].eachLayer(l => {
          if (l._poiId === p.id) l.openPopup();
        });
        if (isMobile()) setPanelOpen(false);
      };
      block.appendChild(el);
    });
    sb.appendChild(block);
  });
}

function toggleDay(id) {
  dayVisible[id] = !dayVisible[id];
  const vis = dayVisible[id];
  if (routeLayers[id]) vis ? map.addLayer(routeLayers[id]) : map.removeLayer(routeLayers[id]);
  if (markerLayers[id]) vis ? map.addLayer(markerLayers[id]) : map.removeLayer(markerLayers[id]);
  document.getElementById("block-" + id).style.opacity = vis ? 1 : 0.4;
}

document.getElementById("toggleAll").onclick = () => {
  allVisible = !allVisible;
  DAYS.forEach(d => {
    dayVisible[d.id] = allVisible;
    if (routeLayers[d.id]) allVisible ? map.addLayer(routeLayers[d.id]) : map.removeLayer(routeLayers[d.id]);
    if (markerLayers[d.id]) allVisible ? map.addLayer(markerLayers[d.id]) : map.removeLayer(markerLayers[d.id]);
    const b = document.getElementById("block-" + d.id);
    if (b) b.style.opacity = allVisible ? 1 : 0.4;
  });
};

buildSidebar();
addStayCenters();

(async () => {
  const bounds = [];
  try {
    for (const day of DAYS) {
      addMarkers(day);
      let geom;
      if (day.mode === "drive") {
        geom = await fetchOsrm(day.waypoints);
      } else {
        geom = { type: "LineString", coordinates: day.waypoints };
      }
      const layer = L.geoJSON(geom, {
        style: {
          color: day.color,
          weight: day.mode === "walk" || day.mode === "local" ? 4 : 5,
          opacity: day.mode === "flight" ? 0.35 : 0.88,
          dashArray: day.dash || (day.mode === "flight" ? "4,12" : null)
        }
      });
      layer.addTo(map);
      routeLayers[day.id] = layer;
      bounds.push(layer.getBounds());
    }
    const b = bounds.reduce((acc, x) => acc.extend(x));
    map.fitBounds(b.pad(isMobile() ? 0.08 : 0.05));
    refreshMapSize();
    document.getElementById("status").textContent = "✅ 已加载 " + DAYS.length + " 天路线 · " +
      DAYS.reduce((n,d)=>n+d.pois.length,0) + " 个点位";
    document.getElementById("status").style.background = "#dcfce7";
  } catch (e) {
    document.getElementById("status").textContent = "⚠️ 部分路线加载失败，请刷新 · 点位仍可见";
    document.getElementById("status").style.background = "#fef3c7";
  }
})();
</script>
